<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dungeon Depths</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #ccc;
  font-family: 'Courier New', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
#header {
  padding: 6px 16px;
  background: #111;
  border-bottom: 1px solid #2a2a2a;
  font-size: 16px;
  color: #c80;
  text-align: center;
  letter-spacing: 3px;
  flex-shrink: 0;
}
#game-area {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}
#map-container {
  flex: 1;
  padding: 8px 10px;
  overflow: hidden;
  display: flex;
  align-items: flex-start;
}
#map {
  font-size: 14px;
  line-height: 1.25;
  white-space: pre;
  letter-spacing: 0px;
}
#sidebar {
  width: 210px;
  background: #0e0e0e;
  border-left: 1px solid #2a2a2a;
  padding: 10px;
  overflow-y: auto;
  font-size: 12px;
  flex-shrink: 0;
}
.sidebar-section { margin-bottom: 14px; }
.sidebar-title {
  color: #c80;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 7px;
  padding-bottom: 3px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 3px;
  line-height: 1.5;
}
.stat-label { color: #666; }
.stat-value { color: #ccc; }
.hp-bar {
  height: 6px;
  background: #1a0000;
  border-radius: 2px;
  margin-bottom: 7px;
  border: 1px solid #300;
}
.hp-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.15s, background 0.3s;
}
.inv-item {
  padding: 3px 4px;
  cursor: pointer;
  border-radius: 2px;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.inv-item:hover { background: #1a1a1a; color: #fff; }
.inv-key { color: #555; font-size: 10px; }
#messages {
  height: 108px;
  background: #080808;
  border-top: 1px solid #2a2a2a;
  padding: 6px 10px;
  overflow-y: auto;
  font-size: 11px;
  flex-shrink: 0;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: #111; }
#messages::-webkit-scrollbar-thumb { background: #333; }
.msg { margin-bottom: 1px; line-height: 1.5; }
.msg.combat { color: #e66; }
.msg.good  { color: #6e6; }
.msg.loot  { color: #6cf; }
.msg.info  { color: #88a; }
.msg.warn  { color: #ec6; }
.msg.level { color: #fc0; font-weight: bold; }
@keyframes gold-sparkle {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1);    }
  60%  { opacity: 1; transform: translateX(-50%) translateY(-18px) scale(1.2); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-32px) scale(0.8); }
}
.gold-sparkle {
  position: fixed;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  pointer-events: none;
  animation: gold-sparkle 0.65s ease-out forwards;
  z-index: 100;
}
@keyframes lvup-float {
  0%   { opacity: 1; transform: translateX(-50%) translateY(0);     }
  100% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
}
.lvup-text {
  position: fixed;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: #fc0;
  text-shadow: 0 0 8px #fc0;
  pointer-events: none;
  animation: lvup-float 1.1s ease-out forwards;
  z-index: 100;
}
#hints {
  padding: 3px 10px;
  background: #0a0a0a;
  border-top: 1px solid #1a1a1a;
  font-size: 10px;
  color: #444;
  text-align: center;
  flex-shrink: 0;
}
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.obox {
  background: #0e0e0e;
  border: 1px solid #444;
  padding: 36px 48px;
  text-align: center;
  min-width: 340px;
}
.otitle { font-size: 30px; margin-bottom: 10px; letter-spacing: 3px; }
.osub   { color: #666; margin-bottom: 20px; font-size: 13px; }
.ostats { color: #aaa; margin-bottom: 28px; line-height: 2; font-size: 13px; }
.btn {
  background: #1a1a1a;
  border: 1px solid #555;
  color: #ccc;
  padding: 9px 22px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  letter-spacing: 1px;
  margin: 4px;
}
.btn:hover { border-color: #c80; color: #c80; }
.shop-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 6px; border-bottom: 1px solid #1a1a1a;
  cursor: pointer; font-size: 13px;
}
.shop-item:hover:not(.cant-afford) { background: #1a1a1a; }
.shop-item.cant-afford { opacity: 0.38; cursor: default; }
</style>
</head>
<body>

<div id="header">⚔ &nbsp; DUNGEON DEPTHS &nbsp; ⚔</div>

<div id="game-area">
  <div id="map-container"><div id="map"></div></div>
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Hero</div>
      <div class="hp-bar"><div class="hp-fill" id="hp-fill"></div></div>
      <div class="stat-row"><span class="stat-label">HP</span>    <span class="stat-value" id="s-hp"></span></div>
      <div class="stat-row"><span class="stat-label">Level</span> <span class="stat-value" id="s-lv"></span></div>
      <div class="stat-row"><span class="stat-label">XP</span>    <span class="stat-value" id="s-xp"></span></div>
      <div class="stat-row"><span class="stat-label">Attack</span><span class="stat-value" id="s-atk"></span></div>
      <div class="stat-row"><span class="stat-label">Defense</span><span class="stat-value" id="s-def"></span></div>
      <div class="stat-row"><span class="stat-label">Gold</span>  <span class="stat-value" id="s-gold"></span></div>
      <div class="stat-row"><span class="stat-label">Floor</span> <span class="stat-value" id="s-floor"></span></div>
      <div class="stat-row"><span class="stat-label">Turns</span> <span class="stat-value" id="s-turns"></span></div>
      <div id="s-god"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Equipment</div>
      <div id="s-equip"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Inventory <span style="color:#555;font-size:10px">(1-5 to use)</span></div>
      <div id="s-inv"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Nearby</div>
      <div id="s-nearby" style="color:#555;font-size:11px">—</div>
    </div>
  </div>
</div>

<div id="messages"></div>
<div id="hints">WASD / ↑↓←→ Move &nbsp;|&nbsp; G Pick up &nbsp;|&nbsp; 1-5 Use item &nbsp;|&nbsp; &gt; Descend stairs &nbsp;|&nbsp; . Wait &nbsp;|&nbsp; ? Help</div>

<script src="js/engine.js"></script>
<script>
'use strict';

// ─── Messages ────────────────────────────────────────────────────────────────
function msg(text, cls='') {
  G.log.unshift({text,cls});
  if (G.log.length>60) G.log.pop();
  const el = document.getElementById('messages');
  el.innerHTML = G.log.slice(0,20).map(m=>`<div class="msg ${m.cls}">${m.text}</div>`).join('');
}

// ─── Rendering ───────────────────────────────────────────────────────────────
function draw() {
  const lines = [];
  for (let y=0; y<H; y++) {
    const parts = [];
    for (let x=0; x<W; x++) parts.push(cell(x,y));
    lines.push(parts.join(''));
  }
  document.getElementById('map').innerHTML = lines.join('\n');
  sidebar();
}

function cell(x,y) {
  const vis = G.visible[y][x];
  const exp = G.explored[y][x];
  const tile = G.map[y][x];

  if (!exp) return span(' ','#000');

  if (G.npc && G.npc.x===x && G.npc.y===y) {
    return vis ? span('@', '#0cd', '0 0 7px #0cd') : span('@', '#1a4a4a');
  }
  if (x===G.p.x && y===G.p.y) {
    const fc = flashColor('levelup') || flashColor('potion') || flashColor('player');
    return fc ? span('@', fc, `0 0 10px ${fc}`) : span('@','#ff0','0 0 5px #fc0');
  }
  if (vis && G.slashAnims.length) {
    const sl = G.slashAnims.find(s => s.path.some(p => p[0]===x && p[1]===y));
    if (sl) {
      const frame = Math.floor((Date.now() - sl.start) / SLASH_FRAME_MS);
      const idx   = sl.path.findIndex(p => p[0]===x && p[1]===y);
      if (idx === frame)     return span(sl.ch, '#fff', '0 0 8px #fff');
      if (idx === frame - 1) return span(sl.ch, '#666', null);
    }
  }

  if (vis && G.lvPulse && tile === TILE.FLOOR) {
    const elapsed = Date.now() - G.lvPulse.start;
    const ring = Math.floor(elapsed / 120);
    const dist = Math.max(Math.abs(x - G.lvPulse.x), Math.abs(y - G.lvPulse.y));
    if (dist === ring + 1) return span('*', '#fc0', '0 0 6px #fc0');
    if (dist === ring && ring > 0) return span('+', '#a60');
  }

  if (vis) {
    const dy = G.dying.find(d=>d.x===x&&d.y===y);
    if (dy) {
      const fi = Math.min(Math.floor((Date.now()-dy.start)/DEATH_FRAME_MS), DEATH_FRAMES.length-1);
      const f = DEATH_FRAMES[fi];
      return f.sh ? span(f.ch, f.col, f.sh) : span(f.ch, f.col);
    }
    const en = G.enemies.find(e=>e.x===x&&e.y===y);
    if (en) {
      const fc = flashColor(en.id);
      return fc ? span(en.ch, fc, `0 0 8px ${fc}`) : span(en.ch, en.col, `0 0 4px ${en.col}`);
    }
    const it = G.items.find(i=>i.x===x&&i.y===y);
    if (it) return span(it.ch, it.col);
  }

  if (tile===TILE.STAIRS) return span('>', vis?CELL.stair_v:CELL.stair_e);
  if (tile===TILE.WALL)   return span('#', vis?CELL.wall_v :CELL.wall_e);
  if (tile===TILE.FLOOR) {
    if (G.gasTiles.has(`${x},${y}`))
      return span('.', vis?'#3a5a2a':'#1a2a1a', vis?'0 0 3px #2a4a1a':null);
    const bt = G.bloodTiles.get(`${x},${y}`);
    if (bt) return span(bt.ch, vis ? bt.col : '#3a0000');
    return span('.', vis?CELL.floor_v:CELL.floor_e);
  }
  return span(' ','#000');
}

function sidebar() {
  const p = G.p;
  const pct = Math.max(0, p.hp/p.maxHp*100);
  const fill = document.getElementById('hp-fill');
  fill.style.width = pct+'%';
  fill.style.background = pct>50?'#3a3':pct>25?'#a83':'#c33';

  document.getElementById('s-hp').textContent    = `${p.hp}/${p.maxHp}`;
  document.getElementById('s-lv').textContent    = p.lv;
  document.getElementById('s-xp').textContent    = `${p.xp}/${p.xpNext}`;
  document.getElementById('s-atk').textContent   = atk(p);
  document.getElementById('s-def').textContent   = def(p);
  document.getElementById('s-gold').textContent  = p.gold+'g';
  document.getElementById('s-floor').textContent = G.depth+' / 10';
  document.getElementById('s-turns').textContent = G.turns;
  document.getElementById('s-god').innerHTML = G.god ? '<div style="color:#ff0;font-size:11px;letter-spacing:1px;margin-top:4px">⚡ GOD MODE</div>' : '';

  document.getElementById('s-equip').innerHTML = `
    <div class="stat-row"><span class="stat-label">Weapon</span>
      <span style="color:${p.weapon?'#fb2':'#444'}">${p.weapon?p.weapon.name:'Fists'}</span></div>
    <div class="stat-row"><span class="stat-label">Armor</span>
      <span style="color:${p.armor?'#8af':'#444'}">${p.armor?p.armor.name:'None'}</span></div>`;

  const invEl = document.getElementById('s-inv');
  if (!p.inv.length) {
    invEl.innerHTML = '<span style="color:#444">Empty</span>';
  } else {
    invEl.innerHTML = p.inv.map((it,i)=>
      `<div class="inv-item" onclick="useInvItem(${i})">
        <span style="color:#555">${i+1}</span>
        <span style="color:${it.col}">${it.ch}</span>
        <span>${it.name}${it.type==='potion'?` <span style="color:#555">(${it.val}hp)</span>`:''}</span>
      </div>`
    ).join('');
  }

  const items = G.items.filter(i=>G.visible[i.y][i.x]&&i.x===G.p.x&&i.y===G.p.y);
  const nb = document.getElementById('s-nearby');
  if (items.length) {
    nb.innerHTML = items.map(i=>`<span style="color:${i.col}">${i.ch}</span> ${i.name}`).join('<br>');
    nb.style.color='';
  } else {
    nb.textContent='—';
    nb.style.color='#444';
  }
}

// ─── Tutorial & Help ─────────────────────────────────────────────────────────
function showTutorial() {
  removeOverlay();
  const ov = document.createElement('div');
  ov.className = 'overlay'; ov.id = 'overlay';
  ov.innerHTML = `<div class="obox" style="max-width:530px;text-align:left">
    <div style="color:#c80;font-size:20px;text-align:center;margin-bottom:20px;letter-spacing:2px">HOW TO PLAY</div>

    <div style="color:#c80;font-size:10px;letter-spacing:2px;margin-bottom:8px">MOVEMENT &amp; ACTIONS</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 24px;font-size:12px;margin-bottom:18px;color:#bbb">
      <div><span style="color:#777">WASD / Arrows</span> &mdash; Move</div>
      <div><span style="color:#777">G</span> &mdash; Pick up item at your feet</div>
      <div><span style="color:#777">1 &ndash; 5</span> &mdash; Use inventory potion</div>
      <div><span style="color:#777">.</span> &mdash; Wait one turn (rests &amp; heals)</div>
      <div><span style="color:#777">Walk onto &gt;</span> &mdash; Staircase prompt</div>
      <div><span style="color:#777">?</span> &mdash; Show this help again</div>
    </div>

    <div style="color:#c80;font-size:10px;letter-spacing:2px;margin-bottom:8px">COMBAT</div>
    <div style="font-size:12px;color:#bbb;margin-bottom:18px;line-height:1.8">
      <b style="color:#ccc">Walk into an enemy to attack.</b> Combat is turn-based — every move or action you take lets every visible enemy act too. Kill enemies to earn XP and level up, gaining HP and attack. Resting heals 1&nbsp;HP every 10 turns — enemies hunt your last known position for ~10 turns if you flee.
    </div>

    <div style="color:#c80;font-size:10px;letter-spacing:2px;margin-bottom:8px">SYMBOLS</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px 12px;font-size:12px;margin-bottom:18px;color:#aaa">
      <div><span style="color:#ff0">@</span> &nbsp;You (the hero)</div>
      <div><span style="color:#0cd">@</span> &nbsp;Merchant NPC</div>
      <div><span style="color:#555">#</span> &nbsp;Wall</div>
      <div><span style="color:#2a2a2a">.</span> &nbsp;Floor</div>
      <div><span style="color:#eee">&gt;</span> &nbsp;Stairs down</div>
      <div><span style="color:#f4f">!</span><span style="color:#f0f">‼</span><span style="color:#d0d">¶</span> &nbsp;Potion</div>
      <div><span style="color:#fa8">/</span> &nbsp;Weapon</div>
      <div><span style="color:#a75">]</span> &nbsp;Armor</div>
      <div><span style="color:#fb0">$</span> &nbsp;Gold</div>
      <div><span style="color:#4a3">g</span> <span style="color:#3a2">o</span> <span style="color:#f50">D</span> &nbsp;Enemies</div>
    </div>

    <div style="color:#c80;font-size:10px;letter-spacing:2px;margin-bottom:8px">MERCHANTS</div>
    <div style="font-size:12px;color:#bbb;margin-bottom:22px;line-height:1.8">
      Each floor hides a merchant (<span style="color:#0cd">@</span>). <b style="color:#ccc">Bump into them to trade.</b> They sell potions, weapons, and armor for gold — stock is limited and items get better as you go deeper. Loot enemies and grab <span style="color:#fb0">$</span> to build your purse.
    </div>

    <button class="btn" style="width:100%;letter-spacing:2px" onclick="removeOverlay()">BEGIN YOUR DESCENT</button>
    <div style="color:#333;font-size:10px;margin-top:10px;text-align:center">press any key to continue</div>
  </div>`;
  document.body.appendChild(ov);
}

function showHelp() {
  showOverlay(
    '<span style="color:#c80">HELP</span>',
    'Dungeon Depths — Controls',
    `<div style="text-align:left;line-height:2;font-size:12px">
      <b style="color:#c80">Movement</b><br>
      WASD or Arrow Keys — move/attack<br>
      <b style="color:#c80">Actions</b><br>
      G — pick up item at your feet<br>
      1–5 — use inventory item<br>
      &gt; — descend stairs (stand on &gt;)<br>
      . — wait one turn (rest)<br>
      <b style="color:#c80">Tips</b><br>
      Bump into enemies to attack them<br>
      Weapons/armor auto-equip on pickup<br>
      Resting heals 1 HP every 10 turns<br>
      Enemies hunt you for ~10 turns after losing sight<br>
      Reach floor 10, defeat the Hollow King, and descend!
    </div>`,
    [['Close','removeOverlay()']]
  );
}

// ─── Input ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const ov = document.getElementById('overlay');
  if (ov && ov.dataset.shop) {
    if (e.key === 'Escape') { removeOverlay(); return; }

    if (e.key === 'g' || e.key === 'G') { gambleItem(); return; }
    const n = parseInt(e.key);
    if (!isNaN(n) && n >= 1 && e.location !== 3) { buyItem(n - 1); return; }
    return;
  }
  if (ov && ov.dataset.gamble) { closeGamble(); return; }
  if (ov && ov.dataset.stairs) {
    if (e.key === 'y' || e.key === 'Y' || e.key === 'Enter') { descend(); return; }
    if (e.key === 'n' || e.key === 'N' || e.key === 'Escape') { removeOverlay(); return; }
    return;
  }
  if (ov && ov.dataset.lore) {
    const d = parseInt(ov.dataset.lore);
    removeOverlay();
    if (d === 1) showTutorial();
    return;
  }
  if (ov && !G.over) { removeOverlay(); return; }

  // Cheat codes
  if (e.key.length === 1) {
    _cheatBuf = (_cheatBuf + e.key.toLowerCase()).slice(-4);
    if (_cheatBuf === 'next' && !G.over) {
      _cheatBuf = '';
      if (G.depth >= 10) { G.bossDefeated = true; G.won = true; G.over = true; showEnd(); return; }
      G.depth++;
      msg(`[CHEAT] Skipped to floor ${G.depth}.`, 'warn');
      buildFloor(); fov(); draw(); showLore(G.depth);
      return;
    }
    if (_cheatBuf.slice(-3) === 'god' && !G.over) {
      G.god = !G.god;
      msg(`God mode ${G.god ? 'ON ⚡' : 'OFF'}.`, 'warn');
      draw();
    }
    if (_cheatBuf === 'ding' && !G.over) {
      _cheatBuf = '';
      G.p.xp = G.p.xpNext;
      levelUp();
      draw();
    }
  }

  switch(e.key) {
    case 'ArrowUp':   case 'w': case 'W': case 'k': e.preventDefault(); move(0,-1);  break;
    case 'ArrowDown': case 's': case 'S': case 'j': e.preventDefault(); move(0,1);   break;
    case 'ArrowLeft': case 'a': case 'A': case 'h': e.preventDefault(); move(-1,0);  break;
    case 'ArrowRight':case 'd': case 'D': case 'l': e.preventDefault(); move(1,0);   break;
    case 'y': move(-1,-1); break; case 'u': move(1,-1); break;
    case 'b': move(-1,1);  break; case 'n': move(1,1);  break;
    case '7': if(e.location===3) move(-1,-1); break;
    case '9': if(e.location===3) move(1,-1);  break;
    case '8': if(e.location===3) move(0,-1);  break;
    case '2': if(e.location===3) move(0,1);   else useInvItem(1); break;
    case '4': if(e.location===3) move(-1,0);  else useInvItem(3); break;
    case '6': if(e.location===3) move(1,0);   break;
    case '1': if(e.location===3) move(-1,1);  else useInvItem(0); break;
    case '3': if(e.location===3) move(1,1);   else useInvItem(2); break;
    case '5': if(e.location===3) waitTurn();  else useInvItem(4); break;
    case 'g': case 'G': pickup(); break;
    case '>': if(G.map[G.p.y][G.p.x]===TILE.STAIRS) openStairsPrompt(); break;
    case '.': waitTurn(); break;
    case '?': showHelp(); break;
  }
});

// ─── Boot ────────────────────────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
